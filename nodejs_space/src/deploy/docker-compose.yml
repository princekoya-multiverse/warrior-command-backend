# ============================================================
# WARRIOR COMMAND CENTER - Local Development Stack
# ============================================================
# Run locally before deploying to Akash
# Usage: docker-compose -f src/deploy/docker-compose.yml up -d
# ============================================================
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: warrior-postgres
    environment:
      POSTGRES_DB: warrior_command
      POSTGRES_USER: warrior
      POSTGRES_PASSWORD: warrior_local_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U warrior -d warrior_command']
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: warrior-qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333

  backend:
    build:
      context: ../../nodejs_space
      dockerfile: Dockerfile
    container_name: warrior-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://warrior:warrior_local_dev@postgres:5432/warrior_command
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ''
      ABACUSAI_API_KEY: ${ABACUSAI_API_KEY:-}
      LIVEKIT_URL: ''
      LIVEKIT_API_KEY: ''
      LIVEKIT_API_SECRET: ''
      JWT_SECRET: local-dev-secret-change-in-prod
      PORT: '3000'
      NODE_ENV: production
    ports:
      - '3000:3000'
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
